<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<form method="POST" class="bg-white p-6 rounded-xl shadow-md w-80">
    <h2 class="text-xl font-bold mb-4 text-center">Register</h2>

    <input name="username" placeholder="Username" required
        class="w-full mb-3 p-2 border rounded">

    <input type="password" name="password" placeholder="Password" required
        class="w-full mb-4 p-2 border rounded">

    <button class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600">
        Register
    </button>

    <p class="text-sm mt-3 text-center">
        Already have an account? <a href="/login" class="text-blue-500">Login</a>
    </p>
</form>

</body>
</html>
